<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin - Multilog</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/toast.css">
<link rel="stylesheet" href="css/loading.css">
<link rel="stylesheet" href="css/buttons.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/inputs.css">

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#0f172a;
    color:#fff;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.admin-login{
    width:100%;
    max-width:420px;
    padding:24px;
}

.admin-login-title{
    font-size:32px;
    font-weight:800;
    text-align:center;
    margin-bottom:8px;
}

.admin-login-subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:24px;
}

.admin-login-card{
    background:#ffffff;
    color:#0f172a;
    border-radius:16px;
    padding:24px;
}
</style>
</head>

<body>

<div class="admin-login">
    <div class="admin-login-title">MULTILOG ADMIN</div>
    <div class="admin-login-subtitle">Acesso administrativo</div>

    <div class="admin-login-card">
        <div class="ml-input-group">
            <label class="ml-label" for="admin-username">Usuário</label>
            <input class="ml-input" type="text" id="admin-username" placeholder="Digite o usuário">
        </div>

        <div class="ml-input-group">
            <label class="ml-label" for="admin-password">Senha</label>
            <input class="ml-input" type="password" id="admin-password" placeholder="Digite a senha">
        </div>

        <button class="btn btn-primary btn-full" onclick="handleAdminLogin()">
            Entrar no Admin
        </button>

        <button class="btn btn-light btn-full" style="margin-top:10px;" onclick="window.location.href='index.html'">
            Voltar
        </button>
    </div>
</div>

<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/loading.js"></script>
<script src="/js/admin-login.js"></script>

</body>
</html>
