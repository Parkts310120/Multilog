<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Auditoria - Multilog</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/app.css">
</head>

<body>

<div class="container" style="max-width:1200px;">
    <h1>Logs de Auditoria</h1>
    <div class="subtitle">Ações realizadas no sistema</div>

    <div style="margin-bottom:20px;">
        <button class="btn-primary" onclick="window.location.href='/index.html'">
            ⬅️ Voltar
        </button>
    </div>

    <div class="card" style="overflow-x:auto;">
        <table class="table" style="width:100%; min-width:900px;">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Usuário</th>
                    <th>Ação</th>
                    <th>Tabela</th>
                    <th>Registro</th>
                    <th>Detalhes</th>
                </tr>
            </thead>

            <tbody id="tbody-auditoria">
                <tr>
                    <td colspan="5">Carregando auditoria...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/admin-auditoria.js"></script>

</body>
</html>
