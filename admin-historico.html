<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Histórico</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/admin.css">
<link rel="stylesheet" href="css/toast.css">
<link rel="stylesheet" href="css/loading.css">
</head>

<body>
<div class="container">
<h1>🔐 Histórico Admin</h1>

<div class="card">
<button onclick="history.back()">⬅️ Voltar ao Portal</button>
</div>

<div class="card">
<h3>🔎 Filtros</h3>

<div class="filter-grid">
<div class="input-group">
<label for="filtro-data-inicial">Data inicial</label>
<input type="date" id="filtro-data-inicial">
</div>

<div class="input-group">
<label for="filtro-data-final">Data final</label>
<input type="date" id="filtro-data-final">
</div>

<div class="input-group">
<label for="filtro-usuario">Operador</label>
<select id="filtro-usuario"></select>
</div>

<div class="input-group">
<label for="filtro-depositante">Depositante</label>
<select id="filtro-depositante"></select>
</div>

<div class="input-group">
<label for="filtro-area">Área</label>
<select id="filtro-area"></select>
</div>

<div class="input-group">
<label for="filtro-servico">Serviço</label>
<select id="filtro-servico"></select>
</div>
</div>

<button onclick="aplicarFiltros()">Aplicar filtros</button>
<button class="btn-danger" onclick="limparFiltros()">Limpar filtros</button>
</div>

<div class="card">
<h3>📊 Indicadores</h3>
<div id="kpi-container"></div>
<div id="admin-reports"></div>
</div>

<div class="card">
<h3>📈 Gráficos</h3>

<div class="chart-grid">
<div class="chart-box full">
<h4>📅 Produção por Dia</h4>
<canvas id="chart-producao-dia"></canvas>
</div>

<div class="chart-box">
<h4>📦 Tempo por Depositante</h4>
<canvas id="chart-depositante"></canvas>
</div>

<div class="chart-box">
<h4>🛠️ Tempo por Serviço</h4>
<canvas id="chart-servico"></canvas>
</div>

<div class="chart-box">
<h4>👤 Tempo por Operador</h4>
<canvas id="chart-usuario"></canvas>
</div>

<div class="chart-box">
<h4>🏭 Tempo por Área</h4>
<canvas id="chart-area"></canvas>
</div>
</div>
</div>

<div class="card">
<button onclick="exportCSV()">📥 Exportar CSV</button>
<button class="btn-danger" onclick="clearHistory()">Ocultar Todo Histórico</button>
</div>

<div class="card">
<h3>Histórico de Atividades</h3>
<div id="history-container"></div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/loading.js"></script>
<script src="/js/historico.js"></script>

</body>
</html>
