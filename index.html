<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multilog</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/buttons.css">
<link rel="stylesheet" href="css/cards.css">

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#0f172a;
    color:#fff;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.home{
    width:100%;
    max-width:420px;
    padding:24px;
}

.home-title{
    font-size:34px;
    font-weight:800;
    text-align:center;
    margin-bottom:8px;
}

.home-subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:24px;
}

.home-card{
    background:#fff;
    color:#0f172a;
    border-radius:16px;
    padding:24px;
    display:flex;
    flex-direction:column;
    gap:14px;
}
</style>
</head>

<body>

<div class="home">
    <div class="home-title">MULTILOG</div>
    <div class="home-subtitle">Selecione o ambiente</div>

    <div class="home-card">
        <button class="btn btn-success btn-lg" onclick="window.location.href='operator/index.html'">
            📦 Operador / Coletor
        </button>

        <button class="btn btn-primary btn-lg" onclick="window.location.href='admin-login.html'">
            📊 Administração
        </button>
        
    </div>
</div>

</body>
</html>
