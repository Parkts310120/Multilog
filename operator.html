<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multilog WMS</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/app.css">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="css/toast.css">
<link rel="stylesheet" href="css/loading.css">
<link rel="stylesheet" href="css/buttons.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/inputs.css">
<link rel="stylesheet" href="css/operator.css">

<meta name="theme-color" content="#020617">
</head>

<body class="operator-page">

<div class="operator-container" id="login-screen" style="display:none;">
    <div class="operator-title">MULTILOG WMS</div>
    <div class="operator-subtitle">ACESSO OPERACIONAL</div>

    <div class="operator-card">
        <label class="operator-label" for="login-username">Usuário</label>
        <input class="operator-input" type="text" id="login-username" placeholder="OPERADOR">

        <label class="operator-label" for="login-password">Senha</label>
        <input class="operator-input" type="password" id="login-password" placeholder="SENHA">

        <div class="operator-actions">
            <button class="operator-btn operator-btn-start" onclick="handleLogin()">ENTRAR</button>
        </div>

        <div class="error-message" id="login-error">Usuário ou senha incorretos!</div>
    </div>
</div>

<div id="menu-screen" class="operator-container" style="display:none;">

    <div class="operator-title">
        MULTILOG WMS
    </div>

    <div class="operator-subtitle">
        MENU OPERACIONAL
    </div>

    <div class="operator-card">

        <button class="operator-btn operator-btn-start" onclick="abrirNovaAtividade()">
            📦 NOVA ATIVIDADE
        </button>

        <button class="operator-btn operator-btn-secondary">
            📋 CONSULTAR ATIVIDADES
        </button>

        <button class="operator-btn operator-btn-secondary">
            🔄 SINCRONIZAÇÃO
        </button>

        <button class="operator-btn operator-btn-secondary">
            ⚙ CONFIGURAÇÕES
        </button>

        <div id="admin-buttons-menu" class="operator-card" style="display:none; margin-top:14px;">
            <button class="operator-btn operator-btn-secondary" onclick="window.location.href='/admin-dashboard.html'">DASHBOARD</button>
            <button class="operator-btn operator-btn-secondary" onclick="window.location.href='/admin-historico.html'">HISTÓRICO</button>
            <button class="operator-btn operator-btn-secondary" onclick="window.location.href='/admin-cadastros.html'">CADASTROS</button>
            <button class="operator-btn operator-btn-secondary" onclick="window.location.href='/admin-auditoria.html'">AUDITORIA</button>
        </div>

    </div>

</div>

<div class="operator-container" id="app-screen" style="display:none;">
    <div class="operator-title" id="app-title">MULTILOG WMS</div>
    <div class="operator-subtitle" id="app-subtitle">REGISTRO OPERACIONAL</div>

    <div class="operator-status" id="offline-status">
        Online
    </div>

    <div class="operator-card" id="tracking-card">
        <label class="operator-label">Executante</label>
        <input class="operator-input" type="text" id="executante-logado" disabled>

        <label class="operator-label" for="depositor-name">Depositante</label>
        <select class="operator-select" id="depositor-name"></select>

        <label class="operator-label" for="activity-name">Serviço</label>
        <select class="operator-select" id="activity-name"></select>

        <label class="operator-label" for="area-name">Área</label>
        <select class="operator-select" id="area-name"></select>

        <label class="operator-label" for="lote">Lote / NF / OS</label>
        <input class="operator-input" type="text" id="lote" placeholder="SCAN OU DIGITE">

        <label class="operator-label" for="tem-quantidade-esperada">Tem quantidade esperada?</label>
        <select class="operator-select" id="tem-quantidade-esperada" onchange="alternarQuantidadeEsperada()">
            <option value="sim">SIM</option>
            <option value="nao">NÃO</option>
        </select>

        <div id="grupo-quantidade-esperada">
            <label class="operator-label" for="quantidade-esperada">Quantidade esperada</label>
            <input class="operator-input" type="number" id="quantidade-esperada" min="0" step="1" placeholder="PREVISTA">
        </div>

        <label class="operator-label" for="unidade">Unidade</label>
        <input class="operator-input" type="text" id="unidade" value="peça" placeholder="PEÇA / CAIXA / PALLET">

        <div id="grupo-quantidade-realizada" style="display:none;">
            <label class="operator-label" for="quantidade-realizada">Quantidade realizada</label>
            <input class="operator-input" type="number" id="quantidade-realizada" min="0" step="1" placeholder="REALIZADA">
        </div>

        <div id="grupo-observacao" style="display:none;">
            <label class="operator-label" for="observacao">Observação</label>
            <textarea class="operator-input" id="observacao" rows="3" placeholder="DIVERGÊNCIA / AVARIA / FALTA"></textarea>
        </div>

        <div class="operator-status">
            <div id="status-container">
                <span class="status-badge status-free">PRONTO PARA INICIAR</span>
            </div>

            <div id="live-timer" style="font-size:1.4rem;font-weight:bold;margin-top:8px;display:none;">
                00:00:00
            </div>
        </div>

        <div class="operator-actions">
            <button class="operator-btn operator-btn-start" id="btn-start" onclick="startTracking()">INICIAR</button>
            <button class="operator-btn operator-btn-finish" id="btn-end" onclick="stopTracking()" disabled>FINALIZAR</button>
        </div>
    </div>

    <div id="admin-buttons" class="operator-card" style="display:none;">
        <button class="operator-btn operator-btn-secondary" onclick="window.location.href='/admin-dashboard.html'">DASHBOARD</button>
        <button class="operator-btn operator-btn-secondary" onclick="window.location.href='/admin-historico.html'">HISTÓRICO</button>
        <button class="operator-btn operator-btn-secondary" onclick="window.location.href='/admin-cadastros.html'">CADASTROS</button>
        <button class="operator-btn operator-btn-secondary" onclick="window.location.href='/admin-auditoria.html'">AUDITORIA</button>
    </div>

    <div class="logout-link" onclick="handleLogout()">SAIR DO APLICATIVO</div>
</div>

<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/offline.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/loading.js"></script>
<script src="/js/operator-ui.js"></script>
<script src="/js/index.js"></script>

</body>
</html>
